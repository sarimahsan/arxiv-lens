name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  health-check-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start backend server
        run: |
          cd backend
          # Start server in background
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 &> server.log &
          echo "Backend server started, waiting for it to be ready..."

      - name: Wait for /health endpoint
        run: |
          cd backend
          for i in {1..20}; do
            health_response=$(curl -s http://localhost:8000/health || true)
            if echo "$health_response" | grep -q '"status":"ok"'; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for server... ($i/20)"
            sleep 2
          done
          echo "Health check failed!"
          cat server.log
          exit 1

      - name: Push changes
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git push https://${GITHUB_ACTOR}:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git main